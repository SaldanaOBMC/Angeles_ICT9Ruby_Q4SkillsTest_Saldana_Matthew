
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4ecd8;
            text-align: center;
            padding: 40px;
            font-family: "Courier New", monospace;
        }
        .login {
            width: 320px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            background-color: #fff8e7;
            box-shadow: 4px 4px 0px #8b6f47;
            border: 2px solid #8b6f47;
        }
        h1 {
            color: #d2691e;
        }
        h2 {
            color: #5f9ea0;
        }
        .btn-success {
            background-color: #d2691e;
            border: none;
        }
    </style>
</head>

<body>

    <h1>LOGIN</h1>
    <h2>Use your credentials!!</h2>
    <p>Hint: username is 9ruby and password is classof30</p>

    <div class="login">
        <form onsubmit="return login()">
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Enter Username" required>
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Enter Password" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Login</button>
        </form>
    </div>

    <p id="output" class="mt-3"></p>

    <script>
    var C_Username = "9ruby";
    var C_Password = "classof30";

    var attempts = 0;
    var maxAttempts = 3;

    function login() {

        var username = document.getElementById("username").value;
        var password = document.getElementById("password").value;

        if (attempts >= maxAttempts) {
            alert("Too many failed attempts.");
            return false;
        }

        if (username === C_Username && password === C_Password) {
            alert("Login Successful!");
            document.getElementById("output").innerHTML = "Hey there, " + username + "! Knew it was you!";

            window.location.href = "notebooks.html";

        } else {
            attempts++;
            alert("Login Failed. Attempts Left: " + (maxAttempts - attempts));

            if (attempts === maxAttempts) {
                document.getElementById("output").innerHTML = "read, bro... read...";
            }
        }

        return false;
    }
</script>
</body>
</html>
